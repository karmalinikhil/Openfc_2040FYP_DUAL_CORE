# OpenOCD Configuration for OpenFC2040 (RP2040) via Picoprobe (RP2350)
#
# Hardware Setup:
#   Picoprobe (RP2350)    →    OpenFC2040 (RP2040)
#   ------------------------------------
#   GPIO2 (SWCLK)         →    SWCLK (SWD header)
#   GPIO3 (SWDIO)         →    SWDIO (SWD header)
#   GPIO4/5 (UART)        →    GPIO0/1 (optional UART debug)
#   GND                   →    GND
#   VBUS (optional)       →    3V3 (for VTREF - if required)
#
# Usage:
#   openocd -f debug/openocd_rp2040.cfg
#
# Then in another terminal:
#   gdb-multiarch rsp_2040/px4-autopilot/build/raspberrypi_pico_default/raspberrypi_pico_default.elf
#   (gdb) target extended-remote :3333
#   (gdb) monitor reset halt
#   (gdb) continue

# ========================================
# Interface Configuration (Picoprobe)
# ========================================

# Use CMSIS-DAP interface (Picoprobe appears as this)
adapter driver cmsis-dap

# USB backend (try hid first, fallback to libusb if needed)
cmsis_dap_backend hid

# Specify Picoprobe VID/PID explicitly
# Raspberry Pi Debug Probe: VID=0x2e8a, PID=0x000c
cmsis_dap_vid_pid 0x2e8a 0x000c

# Use SWD transport (not JTAG)
transport select swd

# SWD clock speed (start conservative, can increase to 4000 if stable)
# Lower speed = more reliable, especially with long wires or breadboard
adapter speed 2000

# ========================================
# Target Configuration (RP2040)
# ========================================

# RP2040 has dual Cortex-M0+ cores
set _CHIPNAME rp2040
set _CPUTAPID 0x01002927

# Core 0
set _CORE0_NAME ${_CHIPNAME}.core0
swd newdap ${_CHIPNAME} core0 -expected-id $_CPUTAPID
dap create ${_CHIPNAME}.dap -chain-position ${_CHIPNAME}.core0
target create ${_CORE0_NAME} cortex_m -dap ${_CHIPNAME}.dap -coreid 0

# Core 1 (optional, for multicore debugging)
set _CORE1_NAME ${_CHIPNAME}.core1
target create ${_CORE1_NAME} cortex_m -dap ${_CHIPNAME}.dap -coreid 1

# Default to Core 0
targets ${_CORE0_NAME}

# ========================================
# Memory Map (RP2040)
# ========================================

# Flash: 0x10000000 - 0x11000000 (16MB XIP cache window)
# SRAM:  0x20000000 - 0x20042000 (264KB)
# Boot ROM: 0x00000000 - 0x00004000 (16KB)

# Configure flash bank (W25Q128 = 16MB)
flash bank ${_CHIPNAME}.flash rp2040_flash 0x10000000 0x1000000 1 1 ${_CORE0_NAME}

# ========================================
# Working Area (for flash programming)
# ========================================

# Use 64KB of SRAM for working area
${_CORE0_NAME} configure -work-area-phys 0x20010000 -work-area-size 0x10000 -work-area-backup 1

# ========================================
# Reset Configuration
# ========================================

# Use system reset (SYSRESETREQ)
${_CORE0_NAME} configure -event reset-init {
    # After reset, halt and wait for debugger
    halt
}

# ========================================
# GDB Configuration
# ========================================

# GDB port (default 3333)
gdb_port 3333

# GDB telnet port for remote commands
telnet_port 4444

# TCL port
tcl_port 6666

# ========================================
# Helpful Functions
# ========================================

# Function to reset and halt
proc reset_halt {} {
    reset halt
    sleep 100
}

# Function to reset and run
proc reset_run {} {
    reset run
}

# Function to flash firmware
proc flash_firmware {firmware_bin} {
    halt
    flash write_image erase $firmware_bin 0x10000000
    verify_image $firmware_bin 0x10000000
    reset run
}

# Print help on startup
echo "========================================="
echo "OpenFC2040 Debug Session Ready"
echo "========================================="
echo "Targets:"
echo "  - rp2040.core0 (default)"
echo "  - rp2040.core1"
echo ""
echo "Useful commands:"
echo "  reset halt       - Reset and halt CPU"
echo "  reset run        - Reset and run"
echo "  halt             - Halt CPU"
echo "  resume           - Resume execution"
echo "  reg              - Show registers"
echo "  mdw 0x20000000 16 - Dump memory"
echo ""
echo "Connect GDB:"
echo "  gdb-multiarch build/raspberrypi_pico_default/raspberrypi_pico_default.elf"
echo "  (gdb) target extended-remote :3333"
echo "  (gdb) monitor reset halt"
echo "  (gdb) continue"
echo "========================================="
